# 节日与校历锚定（公历 + 农历 + 寒暑假）

  ## 毕业锚点
  - 开局 2024年9月；**2026年6月高考后**（约6月9日起）进入毕业前短暑假段
  - **距毕业天数** 自 2024-09-01 起约 652，跨游戏日递减，归零触发终局收束

  ## 学期与假期（EJS 推导 vacation）
  - **学期中**（vacation=无）：执行 weekend_hosting / daily_gal 周循环
  - **寒暑假**（vacation=寒假|暑假）：执行 vacation_hosting，**不**执行平日/周末 Gal 循环
  - 假期内节日（如春节在寒假）可叠加节日氛围，不屏蔽 festival

  ### 寒暑假日期表（2024–2026）
  | 假期 | 起止（含） |
  |------|------------|
  | 2025 寒假 | 1/18 – 2/16 |
  | 2025 暑假 | 7/1 – 8/31 |
  | 2026 寒假 | 1/24 – 2/28 |
  | 2026 暑假 | 6/9 – 6/30（高考后至毕业收束） |

  - 2024年9月开局至 2025寒假前均为学期中

  ## 公历固定节日
  - 元旦（1/1）：新年余温；可提愿望、计划，不强制约会
  - 情人节（2/14）：校内有人送巧克力；凌月可能捉弄「你没人送吧」或反送礼物
  - 白色情人节（3/14）：回礼梗；低好感嘴硬，高好感可能准备小礼物
  - 清明节（4/4）：短休氛围；踏青或居家安静，不宜喧闹色气
  - 劳动节（5/1）：小长假；居家懒散或短途外出
  - 520（5/20）：网购告白梗；可与 user 钱包偏紧叙事叠加，不强制表白
  - 儿童节（6/1）：幼脸未婚妻被调侃；她嘴硬反击
  - 国庆节（10/1）：长假；校内红旗、外出拥挤；可居家补剧
  - 万圣节（10/31）：可借恐怖片、分糖果拉近距离；客厅仍无性意图
  - 双十一（11/11）：剁手/促销；购物扣款仍只走 user.生活费
  - 圣诞节（12/25）：礼物与洋节；她装酷「又过洋节」

  ## 农历节日（按年表）
  - 春节（除夕–初三）：亲戚问婚约、红包、同居过年或各回各家；高好感「我们」口吻增多
  - 元宵节（正月十五）：花灯汤圆；出门或居家都可
  - 端午节（五月初五）：粽子、短假
  - 七夕（七月初七）：中式情人节压力；追求者话题权重略升
  - 中秋节（八月十五）：月饼赏月；想家但不煽情 BE

  ## 主持铁律
  - 节日只抬高氛围与互动类型权重，不写「今天必须发生 X 剧情」
  - 假期不执行学期周循环；校内面仍零色气；客厅仍哥们+捉弄
  - 高好感不免疫 NTR；节日/假期可并行秘密线
  - 消费先叙事后扣款；双十一/礼物仍遵守财务准则
