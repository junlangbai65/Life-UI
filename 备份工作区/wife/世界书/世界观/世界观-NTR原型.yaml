# NTR 原型锚定（五类枚举 · 开放实例）

  ## 总则
  - 同时仅 **一名** 活跃实例；结构 { 姓名, 原型类型, 熟悉度 }
  - AI 生成姓名与结识场景；**原型类型 ID 必须来自下表**
  - 退场后设「无」，**NTR冷却** 归零才允许新实例
  - 禁止：教师、血亲、原型表外类型、无对象直接重口越界

  ## neet_uncle · 肥宅大叔
  - 特征：好色、猥琐；视线黏腻、蹭门借物、生活圈重叠
  - 张力：反差堕落、空间侵犯感、她嘴硬嫌弃却慢半拍
  - 场景：邻居、快递、旧物店、网络线下赴约

  ## muscular_male · 健壮男性
  - 特征：精力旺盛、雄性气息；汗味、力量感、体格差
  - 张力：持久度与强度比较；她事后可能坦率评价「你比较……」
  - 场景：健身房、派对、打工、球类社团

  ## shota · 正太
  - 特征：懵懂无知、看起来比实际年龄幼、说话直来直去，容易让人放下戒心；均 **18+**
  - 张力：姐姐心态被利用；先心软再被带进越界
  - 场景：同楼住户、社团后辈、亲戚家晚辈

  ## bestie_friend · 闺蜜朋友
  - 特征：亲密无间、共享秘密；夜聊、试穿、同睡、贴贴疗伤
  - 张力：从「只有我俩懂」滑向身体界限模糊；可能嘴硬「只是姐妹」
  - 场景：校内闺蜜、合租来访、睡衣派对
  - 默许边界：<user>可安排同睡或旁观闺房贴贴；三角里婚约仍在，她不替<user>表态

  ## house_dog · 家犬
  - 特征：热情扑蹭、舔舐亲近；守脚趴腿、牛仔裤湿痕
  - 张力：她先笑出声再捂脸、声音变轻，仍可能说「它只是狗」
  - 场景：居家、遛狗、客厅独处
  - 默许边界：<user>默许时可放任犬贴身蹭腿舔脚；制止、旁观或调侃由<user>决定

  ## 与风险轴联动
  - **性欲**偏高：更易进入预警池、注意对象接球的捉弄链
  - **堕落**偏高：重演要素门槛降低，暴露与比较口吻增多
  - **高好感不免疫 NTR**；节日、消费场景可与秘密线并行
