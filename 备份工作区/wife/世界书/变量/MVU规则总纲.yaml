# MVU 规则总纲
# Zod MVU：JSON Patch 路径从根开始（无 stat_data 前缀），元组字段只改 /路径/0，数值优先 delta，禁止改 $/_ 派生字段

  ## 全局更新铁律
  - **先叙事后更新**：行为/结果在本轮正文写完后，才在 UpdateVariable 结算
  - **单轮单次**：同一数值字段每轮最多改一次（破处、里程碑等同事件捆绑除外）
  - **只认本轮**：不因计划或预感更新；无实质推进则大量字段留空
  - **跨日字段**：日/星期/距毕业天数/NTR冷却递减，仅在叙事跨游戏日时动
  - 财务扣款：先叙事后扣 **user.生活费**；单笔消费只扣一次，禁止预判与合并扣款（完整规则见经济系统条目）

  ## 数值节奏（长期慢养）
  | 变量 | 典型单次幅度 | 冷却 |
  |------|-------------|------|
  | 好感度 | ±1~5（日常偏小） | 每轮最多 1 次 delta |
  | 性欲 | 升 +1~2/日；降 -5~12/次亲密 | 被动升/亲密降各每日最多 1 次 |
  | 堕落 | 越界 +3~8；纯爱 -1~2 | 每游戏日升最多 1 次 |
  | 暴露度 | 事件 +3~8 | 同事件不重复计 |
  | 熟悉度 | 互动 +2~5 | 每游戏日最多 1 次（破处另计） |
  | NTR阶段 | 单轮最多 ±1 级 | 升级后 NTR冷却≥3 |

  ## 自然衰减（须叙事支撑）
  | 变量 | 触发条件 | 衰减幅度 | 频率 |
  |------|----------|----------|------|
  | 体内精液量 | 洗澡/清理完成 | -40~100 | 每事件一次 |
  | 体内精液量 | 同日推进≥2h、无新性行为 | -3~8 | 每轮最多一次 |
  | 体内精液量 | 跨游戏日、无新性行为 | -10~20 | 每跨日最多一次 |
  | 暴露度 | 跨日、无新暴露 | -2~5 | 每跨日最多一次 |
  | 暴露度 | 对质和解完成 | -5~10 | 每事件一次 |
  | 堕落 | 跨日无 NTR 新事件 | -1（可选） | 每跨日最多一次 |
  | 堕落 | 连续 7 日无越界叙事 | 额外 -1~2（可选） | 不与跨日 -1 同日复用 |

  - 跨日时可与距毕业天数、NTR冷却递减**同批**结算多项衰减
  - 同一字段同轮只结算一次下降（清洁优先于时间衰减）

  ## 经济口径
  - 玩法仅追踪 **user.生活费**（每月初可重置 2000 元）
  - 请客、接济、礼物、共同消费：先叙事后扣 **user.生活费**；不涉及凌月独立钱包
  - 物价锚定与扣款铁律见经济系统条目

  ## 世界.场景类型
  - **校内**：市立第三高中及校园相关；三面性启用凌班长面，零色气
  - **居家**：合租公寓；赤脚、哥们捉弄面
  - **外出**：校外非校园场景
  - **其他**：不适用以上分类时

  ## 节日（EJS 推导，非 MVU 字段）
  - 当日节日由 世界.年/月/日 公历匹配（农历节日按 2024–2026 年表），值为节日名或「无」
  - 玩法指导在 **假期/节日** 之前插入主持（假期优先于节日单独支）

  ## 寒暑假（EJS 推导 vacation，非 MVU 字段）
  - `无` | `寒假` | `暑假`；由 EJS `resolveVacation(年,月,日)` 按校历表匹配
  - **假期内不执行** `weekend_hosting` / `daily_gal` 学期周循环，改由 `vacation_hosting`
  - 2025 寒假 1/18–2/16、暑假 7/1–8/31；2026 寒假 1/24–2/28、暑假 6/9–6/30（高考后）；学期中走 weekend/daily_gal

  ## 距毕业天数
  - 开局约 **652**（2024-09-01 → 2026-06 高考后毕业）；跨游戏日 -1，归零终局
  - **归零后**「毕业结局指引」按好感/堕落/关系形态锁定四结局之一（纯爱相约/带伤相守/默许并行/各奔东西），见该条目定义与描写方向

  ## 风险轴（性欲 · 堕落）
  - **性欲** [0,100]：长期忽视上升，与<user>亲密可下降；驱动预警池与纯爱 adult 窗口
  - **堕落** [0,100]：越界后上升，纯爱亲密可部分抑制；影响重演门槛与暴露权重
  - EJS 分档：性欲 低迷/偏升/高涨/迫切；堕落 洁净/沾染/深陷/沉溺（见风险轴调制条目）

  ## 凌月.关系形态
  - **默认**：未明确NTR知情或默许
  - **user知情**：user已知暧昧或越界迹象
  - **默许**：user暗示、安排或接受Netorase边界
  - **开放边界**：长期开放/共享式关系形态

  ## 凌月.NTR阶段（与好感正交）
  - **0 安全**：无NTR调制条目输出
  - **1 预警**：暧昧、时间空白、慢半拍
  - **2 越界**：可与NTR对象发生 fully explicit 性爱
  - **3 暴露**：隔墙听见、撞见、痕迹、对质权重升高

  ## NTR对象（单槽位）
  - **无**：当前无活跃NTR实例
  - **对象结构**：{ 姓名, 原型类型, 熟悉度 }
  - **生命周期**：满足条件生成一个实例 → 熟悉度随互动上升 → 退场（疏远/对质/拒绝等）设「无」 → **NTR冷却** 归零后才允许新原型实例
  - **禁止**：同时两名活跃对象；无对象直接重口越界

  ## NTR原型类型 ID
  - **neet_uncle**：肥宅大叔；好色、猥琐，借邻接空间与视线黏腻制造压迫
  - **muscular_male**：健壮男性；精力旺盛、雄性气息，体格差与持久度易触发她坦率比较
  - **shota**：正太（角色均18+）；懵懂无知、惹人怜爱，她可能先心软再被带进越界
  - **bestie_friend**：闺蜜女性朋友；亲密无间、共享秘密与闺房时间，试穿同睡、贴贴疗伤，从「只有我俩懂」滑向身体界限模糊
  - **house_dog**：家犬；热情扑蹭、舔舐亲近、守脚趴腿；她先笑话再脸红

  ## 凌月.破处与好感联动
  - **是否处女**：首次实质插入**正文完成后** `false`，不可逆
  - **破处对象**：与失贞同批写入；user 破处好感 **固定 +30**；ntr 破处熟悉度 +15~22
  - 破处加成一生仅一次；与里程碑.首次与user性爱 可不同步发生

  ## 凌月.里程碑
  - 六项均为一次性 bool：首次共进晚餐、首次向user求助、首次维护user、首次谈未来、首次与user性爱、首次默许
  - 发生后置 true，不可逆

变量更新规则:
  _全局铁律:
    check:
      - 见上文「全局更新铁律」
      - 【跨日捆绑】跨游戏日时，距毕业天数、NTR冷却、自然衰减类字段（体内精液量、暴露度等）可在同一条 JSON Patch 中各更新一次
      - 【无变化则不改】日常闲聊、无实质情节推进时，数值字段应大量留空，不每轮都动

  _自然衰减:
    说明: 见上文「自然衰减」表；须在叙事中体现对应事实后才可结算，禁止无叙事硬减
    check:
      - 体内精液量：见凌月.体内精液量
      - 暴露度：见凌月.暴露度
      - 堕落：见凌月.堕落（长期无越界时的极慢回落）
      - 衰减与上升同字段互斥时，同轮只结算一次 delta（取叙事主因：如洗澡优先于跨日小幅衰减）

  世界:
    年:
      type: number
      check:
        - 时机：叙事跨公历年后的首日已写出后 replace
        - 与月/日同步；单轮最多改一次
    月:
      type: number
      range: 1~12
      check:
        - 时机：跨月后的首日叙事完成后与日期同步 replace
    日:
      type: number
      range: 1~31
      check:
        - 时机：跨午夜至新游戏日的叙事完成后 replace；与星期同步
        - 每跨一个游戏日：距毕业天数 delta -1（同批一次）
    星期:
      type: '一'|'二'|'三'|'四'|'五'|'六'|'日'
      check:
        - 时机：改日期时已写出跨日结果后 replace；与月/日同批
    时间:
      format: HH:mm
      check:
        - 时机：本轮互动时间流逝已在正文体现后 replace
        - 幅度：单次推进约 10~120 分钟；无明确时间流逝则不改
        - 冷却：无剧情时间推进时不更新
    当前场景:
      check:
        - 时机：角色已完成场景切换（到达/离开）后 replace
    场景类型:
      type: '校内'|'居家'|'外出'|'其他'
      check:
        - 时机：离校/回家/外出行为已完成后与当前场景同步 replace
    天气:
      check:
        - 时机：跨日或剧情明确天气变化已写出后 replace
        - 冷却：同一游戏日内无特殊天气事件则不重复改
    距毕业天数:
      type: number
      range: 0~999
      check:
        - 锚点：2024-09-01 开局约 652 天至 2026-06 高考后毕业
        - 时机：仅当世界.日已跨至新游戏日后 delta -1
        - 幅度：每游戏日最多 -1；禁止单轮减多次
        - 归零后触发毕业终局主持，不再递减

  user:
    生活费:
      type: number
      check:
        - 时机：支付/接济行为已在正文完成后才 delta；单笔只扣一次，禁止预判与合并（经济系统）
        - 幅度：单笔消费按物价叙事，通常 -5~200；接济凌月 -20~200
        - 冷却：同一笔消费只扣一次；每月1日跨日后可 replace 重置 2000
        - 禁止预判、重复扣款、合并多笔为一笔

  凌月:
    穿着.${上身|下身|鞋袜}:
      check:
        - 时机：换装/到校换鞋/回家换鞋行为已完成后 replace
        - 冷却：无换装叙事则不更新

    对user的好感度:
      type: number
      range: 0~400
      category:
        0~100: 观察试探
        101~200: 友达以上
        201~300: 心意萌动
        301~400: 默契相伴
      check:
        - 时机：本轮凌月与<user>的互动已结束，且正文已呈现其态度变化后 delta
        - 幅度：见上文数值节奏表；日常正面 +1~3，显著正面 +3~5；负面 -1~3，严重伤害 -3~5
        - 破处加成（仅一次）：user 破处同批固定 delta +30；该轮不再叠加其它好感 delta
        - 冷却：每轮最多 delta 一次；同一轮内不因多句对话累加
        - 无实质关系变化时不改

    性欲:
      type: number
      range: 0~100
      check:
        - 时机：忽视/亲密的后果已在叙事中体现后更新；禁止边进行边改
        - 上升/下降/冷却：见上文数值节奏表
        - 分档参考：<40低迷 40~54偏升 55~74高涨 ≥75迫切

    堕落:
      type: number
      range: 0~100
      check:
        - 时机：NTR 越界行为已在正文完整写出后 delta 上升；纯爱亲密结束后可下降
        - 上升/下降/冷却：见上文数值节奏表与自然衰减表
        - 分档参考：<20洁净 20~49沾染 50~79深陷 ≥80沉溺

    暴露度:
      type: number
      range: 0~100
      check:
        - 时机：隔墙听见、痕迹、撞见、对质已在正文发生后 delta 上升
        - 上升/下降/冷却：见上文数值节奏表与自然衰减表
        - 可辅助推进 NTR阶段 向 3，但须单独满足阶段规则

    是否处女:
      type: boolean
      check:
        - 时机：首次实质插入已在正文完成后 replace false
        - 须与破处对象、好感/熟悉度加成同批更新；不可逆

    破处对象:
      type: '无'|'user'|'ntr'
      check:
        - 时机：失贞行为已完成后，与是否处女同批 replace 一次
        - user：同批 delta 好感度 +30（固定值）
        - ntr：同批 delta NTR对象/0/熟悉度 +15~22；须 NTR 对象非无
        - 一生仅一次；已非无后禁止再改

    性爱次数:
      与user:
        type: number
        check:
          - 时机：与<user>实质性行为已在正文完成后 +1
          - 冷却：同一轮、同一事件只 +1
      越界:
        type: number
        check:
          - 时机：与 NTR 对象越界行为已在正文完成后 +1
          - 冷却：同一轮、同一事件只 +1

    体内精液量:
      type: number
      range: 0~100
      check:
        - 抽象刻度，非精确毫升；0=无痕迹叙事，100=满载痕迹
        - 上升/下降/冷却：见上文自然衰减表与凌月字段说明
        - 下降优先级：清洁 > 跨日 > 同日时间；同轮只结算一种下降原因

    NTR阶段:
      type: number
      range: 0~3
      category:
        0: 安全
        1: 预警
        2: 越界
        3: 暴露
      check:
        - 时机：阶段跃迁的触发事件已在正文完成后 replace
        - 幅度：单轮最多升 1 级或降 1 级，禁止跳级
        - 0→1：暧昧/单独相处/消息伏笔等已写出
        - 1→2：越界性行为已完成
        - 2→3：暴露事件（听见/撞见/对质）已发生
        - 冷却：升级后须设 NTR冷却≥3；冷却>0 时禁止再次升级 NTR阶段
        - 降级需对质/疏远/拒绝等叙事，不可无因骤降

    NTR冷却:
      type: number
      range: 0~999
      check:
        - 时机：越界或暴露事件**完成后**设 3~7；仅当叙事跨至新游戏日时 delta -1
        - 冷却：冷却>0 时禁止新 NTR 对象实例、禁止 NTR阶段 再升
        - 每游戏日最多递减一次

    关系形态:
      type: '默认'|'user知情'|'默许'|'开放边界'
      check:
        - 时机：<user>知情/安排/旁观/默许已在正文明确发生后 replace 升级
        - 冷却：单轮最多升一级；不可逆降级需谨慎叙事

    里程碑.${首次共进晚餐|首次向user求助|首次维护user|首次谈未来|首次与user性爱|首次默许}:
      type: boolean
      check:
        - 时机：对应事件已在正文**首次**完成后 replace true
        - 冷却：每项一生仅 true 一次；无事件则不预判

  NTR对象:
    type: |-
      '无' | {
        姓名: string;
        原型类型: 'neet_uncle' | 'muscular_male' | 'shota' | 'bestie_friend' | 'house_dog';
        熟悉度: number;
      }
    check:
      - 时机：实例生成/退场须在相关叙事完成后 replace 整个 /NTR对象/0
      - 生成：前置风险与剧情已写出；NTR冷却=0；同时仅一名活跃对象
      - 退场：疏远/对质/拒绝等已完成后 replace 为 '无'，并设 NTR冷却
      - 熟悉度上升：暧昧或单独相处**结束后** delta +2~5
      - 熟悉度冷却：每游戏日非破处情况下最多 +1 次；破处当次可额外 +15~22
      - 熟悉度 range 0~100
