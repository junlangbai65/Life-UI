# 经济系统：物价锚定与扣款铁律

  ## 1. MVU 口径与物价锚定
  - **仅追踪** `user.生活费`（元）；每月 1 日跨日后可重置为 2000
  - **不涉及**凌月独立钱包、凌月生活费余额或凌月月底断粮类玩法
  - 请客、接济、共同购物、礼物：叙事写出支付后，只扣 **user.生活费**
  - 基准：中国大陆 2024 年前后**普通二线城市**日常物价
  - 原则：禁止离谱价格；具体消费须落在下列区间之一

  ### 参考价格（扣款校准）
  | 项目 | 区间（元） |
  |------|-----------|
  | 矿泉水/可乐 | 3–4 |
  | 泡面/食堂一餐 | 3–18 |
  | 外卖（含配送） | 20–35 |
  | 快餐套餐 | 30–40 |
  | 奶茶/咖啡 | 15–35 |
  | 电影票 | 35–50 |
  | 地铁/公交单次 | 2–6 |
  | 请客/接济（奶茶等） | 15–50 |
  | 聚餐/购物单笔 | 60–200 |

  - 更新规则典型幅度：单笔 delta **-5~200**（与项目匹配）

  ### user 月度 2000 元
  - 父母「同居考验」：每月给 **<user>** 2000 元，学会规划合租开支
  - 2000 元覆盖饮食、出行、娱乐、礼物等；一笔口红约 300 元 ≈ 三四天饭钱量级
  - `user.生活费` 偏低时，凌月可用玩笑催请客或蹭饭，**不**设独立 MVU 阶段变量；接济须先叙事后扣款

  ## 2. 扣款铁律与流程锁定
  ### 绝对总纲
  - **核心**：本准则中的所有规定，其执行优先级【高于】任何关于角色性格、背景或消费习惯的描述性设定
  - **禁令**：【绝对禁止】预扣款、虚拟扣款或合并扣款
  - **禁止预判消费**：只有叙事明确写出支付行为时才扣款
  - **禁止捆绑消费**：严禁将多次独立消费合并为一次扣款

  ### 一次行为，一次扣款
  - 一次具体的、在叙事中被描述的消费行为，【只能】触发一次对应的扣款
  - 变量更新是对【既成事实】的记录；交易结束即锁定，后续叙事不再影响该次金额

  ### 先叙事，后扣款
  1. 正文中清晰描述消费，如「<user>扫码支付了30元」
  2. 同回复 `<UpdateVariable><JSONPatch>` 中对 **`/user/生活费/0`** 有且仅有一次 `delta` 扣减
  - 叙事未发生的消费，【绝对不能】扣款

  ### 自检清单
  - **Q1**：是否对应本次回复【新发生】的具体购买？
  - **Q2**：该购买是否已扣过款？
  - **Q3**：金额是否符合 §1 参考价格？
  - 若任一为否，必须放弃扣款
