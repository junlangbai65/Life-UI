---
# MVU 规则总纲（概念层 + 更新规则）
# JSON Patch 路径无 stat_data 前缀；元组只改 /路径/0；数值优先 delta；禁止改 $/_ 派生字段

  ## 全局铁律
  - **先叙事后更新**；**只认本轮**；路径必须用 `/字段/0`（mvuField 元组）
  - **双模式**（见下「更新模式」）：默认常规回合；用户显式声明时间跨度时启用时空跳跃
  - 财务：先叙事后扣 user.生活费（详见经济系统条目）
  - 无实质推进则大量字段留空
  - **无新行为 → 不输出 patch**：JSONPatch 为 `[]` 或省略 `<UpdateVariable>` 均合法

  ## 更新时机与防重复（铁律）
  - **权威状态**：`<status_current_variable>` / 变量列表 所示快照 = 本回复**动笔前**已有数值；patch 前必须对照，**禁止**按聊天历史「补算」或「重算」已结算事件
  - **只结算本轮正文新完成的行为**：行为须在**本条 AI 回复正文内**写至完成（插入结束、对质结束、阶段事件落地等）；以下**不算**新行为，**禁止**因此 patch：
    - 回忆、复述、追问、心理活动、余波、家务补偿、心虚描写
    - 上一轮已 patch 过的同一事件（如 ntr 破处已在上一楼结算）
    - 仅因 NTR阶段≥1 / 破处对象=ntr / 是否处女=false 而「默认再扣好感」
  - **一次性终态**：下列字段一旦写入终态，**终生不得为同一事件再次 patch**（除非 mode: time_skip 且摘要明确新时间线）

  | 字段 | 仅当快照为… | 且本轮正文… | 已终态则禁止 |
  |------|------------|------------|-------------|
  | 是否处女→false | true | **首次**实质插入完成 | 已为 false |
  | 破处对象 | '无' | 同上，同批 replace | 已为 user/ntr |
  | ntr 破处同批（熟悉度+20~35、好感大扣、越界+1） | 是否处女=true | 同上，**仅该楼一次** | 破处对象=ntr 或 是否处女=false |
  | user 破处 +30 | 是否处女=true | user 首次插入完成 | 破处对象=user |
  | NTR阶段 升级 | 当前阶段 < 目标 | 本轮触发该档升级叙事 | 阶段已≥目标 |
  | NTR 偏线好感扣（阶段档） | 见下表 | 本轮完成对应**新**升级 | 同阶段已 patch 过 |
  | 重复越界好感扣 | — | 本轮完成**新一轮** ntr 性爱且 越界+1 | 本轮无新性爱 |
  | 里程碑.*→true | false | 对应事件**首次**完成 | 已为 true |

  - **Analysis 必写**（见变量输出格式）：`pre-state` 关键字段、`new-this-reply` 本轮新完成项；若快照已终态须写 `skipped: already settled`

  ## 更新模式

  ### 常规回合（默认）
  - 单轮小步：数值优先 `delta`；每数值字段每轮最多 1 次（破处/里程碑捆绑除外）
  - 跨日：日/星期/距毕业天数/NTR冷却 仅叙事跨**单个游戏日**时动；距毕业天数 `delta -1`
  - 好感度：每轮 `delta ±1~5`，禁止无依据 `replace` 大跳

  ### 时空跳跃（用户显式声明时间跨度时）
  **触发**（须同时满足）：
  - `<user>` 在本轮或紧邻上轮**明确写出**时间跳跃（如「过了三个月」「三年后」「跳到寒假」「时间来到六月」）
  - 正文须写出跳跃后的**日历锚点**（年/月/日或季节）与关系/生活**摘要**，不得只改数字不写剧情

  **允许同批**（一次回复内）：
  - `replace` 世界.{年,月,日,星期,时间,当前场景,场景类型,天气} 到与摘要一致的终值
  - `delta` `/世界/距毕业天数/0` = **-N**（N = 跳跃经过的游戏日数，须与月/日 replace 自洽）
  - `delta` `/凌月/NTR冷却/0` = **-N**（不低于 0）；跨越多日的自然衰减可按 N 日估算合并
  - `replace` 好感度/性欲/堕落/暴露度/关系形态 到与**摘要中已发生进展**匹配的终值（须在 range/type 内）
  - 里程碑/破处/穿着/性爱次数/NTR对象：仅摘要中**明确已发生**的事件可批量 `replace`/`delta`
  - Analysis 须标注 `mode: time_skip` 并引用 user 原话 + elapsed game days

  **禁止**：
  - 用户未声明时间跳跃时滥用 bulk `replace` 或大 `delta` 追进度
  - 跳跃幅度与正文摘要矛盾（如说「过了一周」却改三个月日历）
  - 经济：跨度 >7 日不得单笔吞掉整段生活费；按跨越的**每个自然月 1 日**可 `replace` 生活费为 2000，或正文写出重大开支再扣款

  ## NTR 对线 → 好感（偏线扣分，与 user 是否知情无关）
  - **语义**：扣分反映她对 NTR 线的身体/情感投入增加，对 `<user>` 婚约线的相对偏爱下降；**不是**「被发现才扣」
  - **高好感扣更狠**：同一事件下，当前 `/凌月/对user的好感度/0` 越高，取区间上沿
  - **同轮最多 1 次** `/凌月/对user的好感度/0` delta；若同轮有多项 NTR 事件，取**最重一项**（ntr 破处 > 阶段升级 > 重复越界）
  - **与 user 破处 +30 对称**：ntr 破处为一次性大扣，见下表「ntr 破处同批」
  - **防重复（必守）**：
    - 快照 `破处对象=ntr` 或 `是否处女=false` → **禁止**再 patch ntr 破处档好感、禁止再 replace 破处对象/是否处女、禁止再发 ntr 破处熟悉度 +20~35
    - 快照 `NTR阶段≥目标` → **禁止**为「进入该阶段」再扣阶段档好感
    - 本轮无**新完成**的 ntr 性爱 → **禁止**扣「重复越界」档（心虚/对话/余波不算）
    - 禁止在**多个连续楼层**对同一破处/同一阶段升级重复扣分；仅**事件发生那一楼**结算一次

  | 当前好感 | NTR阶段 0→1 | 1→2 越界 | 2→3 暴露 | 重复越界（仅 性爱次数.越界 +1） | ntr 破处同批（一次性） |
  |---------|------------|---------|---------|-------------------------------|----------------------|
  | 0~100   | -1~2       | -4~6    | -3~5    | -2~3                          | -12~18               |
  | 101~200 | -2~3       | -6~9    | -5~8    | -3~5                          | -15~22               |
  | 201~300 | -3~4       | -8~12   | -7~10   | -4~6                          | -18~28               |
  | 301~400 | -4~5       | -10~15  | -9~12   | -5~8                          | -22~35               |

  - **熟悉度叙事**：分档见「世界观-NTR原型」；数值仍按每日 +2~5、ntr 破处 +20~35

  ## 数值节奏（常规回合）
  | 变量 | 典型幅度 | 冷却 |
  |------|---------|------|
  | 好感度 | ±1~5（纯爱互动）；NTR 见上表 | 每轮最多 1 次 delta（破处/里程碑/NTR 捆绑除外） |
  | 性欲 | 升 +1~2/日；降 -5~12/次亲密 | 升/降各每日最多 1 次 |
  | 堕落 | 越界 +3~8；纯爱 -1~2 | 每游戏日升最多 1 次 |
  | 暴露度 | 事件 +3~8 | 同事件不重复 |
  | 熟悉度 | +2~5；ntr 破处 +20~35 | 每游戏日最多 1 次（破处当次除外） |
  | NTR阶段 | 单轮 ±1 级 | 升级后 NTR冷却≥3 |

  ## 自然衰减（须叙事支撑，同轮只结算一次下降）
  | 变量 | 触发 | 幅度 |
  |------|------|------|
  | 体内精液量 | 洗澡/清理 | -40~100 |
  | 体内精液量 | 同日≥2h无新性行为 | -3~8 |
  | 体内精液量 | 跨日无新性行为 | -10~20 |
  | 暴露度 | 跨日无新暴露 / 对质和解 | -2~5 / -5~10 |
  | 堕落 | 跨日无 NTR / 7日无越界 | -1 / 额外 -1~2 |

  ## 引用（细节见对应条目，此处不重复）
  - **经济**：user.生活费口径、物价锚定 → 经济系统
  - **场景类型**：校内/居家/外出/其他 → 三面性条目
  - **节日/假期**：EJS 由 年/月/日 推导 festival/vacation → 世界观-节日与校历、玩法指导
  - **距毕业天数**：开局约 652；常规跨日 -1；时空跳跃可一次 delta -N（N 与日历一致）
  - **风险轴/NTR 叙事**：性欲/堕落分档、NTR 阶段与原型 → 风险轴调制、NTR状态调制、世界观-NTR原型
  - **关系形态**：默认/user知情/默许/开放边界
  - **破处**：失贞后 是否处女=false、破处对象 同批写入；user 破处好感 +30（一次）；ntr 破处同批 熟悉度 +20~35、好感按上表一次性大扣
  - **里程碑**：六项一次性 bool，发生后 true 不可逆
  - **穿着**：换装叙事完成后可 replace；变量列表不展开，非必每轮 patch

变量更新规则:
  _全局铁律:
    check:
      - 见上文「更新模式」：默认常规回合；user 显式时间跳跃时用时空跳跃规则
      - 见上文「更新时机与防重复」：对照快照；只 patch 本轮新完成行为；一次性终态禁止重算
      - 跨日可同批：距毕业天数、NTR冷却、衰减类字段各更新一次；时空跳跃可合并为单次 delta -N
      - 日常闲聊无推进：数值大量留空；JSONPatch 可为 `[]`

  _防重复:
    check:
      - patch 前读取快照中 是否处女、破处对象、NTR阶段、性爱次数.越界
      - 破处/ntr 破处/里程碑：快照已终态 → 本轮对应路径 **omit**（Analysis 写 skipped）
      - NTR 偏线好感：仅「本轮新行为」触发表允许扣分；否则 omit /凌月/对user的好感度/0
      - 同路径同事件不得在相邻楼层重复 delta

  _自然衰减:
    check:
      - 见上文自然衰减表；须叙事体现后才结算
      - 同字段衰减与上升互斥，取叙事主因

  世界:
    年:
      check: [跨公历年后首日 replace，与月/日同步；时空跳跃可同批 replace]
    月:
      check: [跨月首日 replace，range 1~12；时空跳跃可同批 replace]
    日:
      check: [跨午夜 replace，与星期同步；常规跨日同批 距毕业天数 delta -1；时空跳跃见更新模式]
    星期:
      type: '一'|'二'|'三'|'四'|'五'|'六'|'日'
      check: [改日期时 replace；时空跳跃与月/日同批]
    时间:
      check: [正文体现时间流逝 replace HH:mm；常规约 10~120 分钟；跳跃后可 replace 到新时段]
    当前场景:
      check: [场景切换或跳跃摘要后 replace]
    场景类型:
      type: '校内'|'居家'|'外出'|'其他'
      check: [离校/回家/外出或跳跃摘要后 replace]
    天气:
      check: [跨日、剧情天气变化或跳跃后 replace；同日无事件不改]
    距毕业天数:
      check: [常规：跨游戏日 delta -1；时空跳跃：delta -N 且 N 与日历 replace 一致；归零后不再递减]

  user:
    生活费:
      check: [支付/接济正文完成后 delta；单笔一次；月首可 reset 2000；见经济系统]

  凌月:
    穿着.${上身|下身|鞋袜}:
      check: [换装/换鞋叙事完成后 replace；无换装不改；列表不展开]

    对user的好感度:
      range: 0~400
      category: {0~100: 观察试探, 101~200: 友达以上, 201~300: 心意萌动, 301~400: 默契相伴}
      check:
        - 常规纯爱互动：delta ±1~5，每轮最多 1 次；须本轮有对<user>的互动行为
        - 破处 user 同批 +30（一次）；快照 是否处女 须为 true
        - NTR 偏线扣分：见「NTR 对线 → 好感」+「防重复」；**仅本轮新完成**的 ntr 事件；同轮取最重一项
        - 禁止：破处对象=ntr 后每楼再扣 ntr 破处档；禁止无新 ntr 性行为扣重复越界档
        - 时空跳跃：摘要含关系/NTR 进展时可 replace 到合理终值

    性欲:
      range: 0~100
      check: [常规：忽视升/亲密降；时空跳跃：可按跨度 replace 到与摘要匹配的终值；分档 <40/55/75]

    堕落:
      range: 0~100
      check: [常规：NTR越界升/纯爱降；时空跳跃：摘要含 NTR 进展时可 replace；见衰减表]

    暴露度:
      range: 0~100
      check: [常规：事件升；时空跳跃：摘要含暴露事件时可 replace；见衰减表]

    是否处女:
      type: boolean
      check:
        - 快照 true 且本轮**首次**实质插入完成 → replace false，与破处对象同批，不可逆
        - 快照已为 false → **禁止** replace（无论正文是否提及失贞）

    破处对象:
      type: '无'|'user'|'ntr'
      check:
        - 快照 '无' 且本轮失贞完成 → replace；一生一次
        - 快照已为 user/ntr → **禁止** replace
        - ntr 同批（仅快照 是否处女=true 当楼）：熟悉度 +20~35、好感 ntr 破处档；**仅此一楼**

    性爱次数:
      与user:
        check: [与user实质性行为完成后 +1；时空跳跃：摘要写明多次时可 replace 终值]
      越界:
        check:
          - 本轮**新完成**一次 ntr 实质性爱 → +1；时空跳跃：摘要写明多次时可 replace 终值
          - 重复越界好感扣：须本轮 +1 **且** 非 ntr 破处当楼 **且** 未同轮 NTR阶段 升级；否则 omit 好感或只结算更重项
          - 快照已反映的越界次数：**禁止**为「补记」同一性爱再 +1 再扣分

    体内精液量:
      range: 0~100
      check: [见衰减表；上升于性行为后；同轮只一种下降原因]

    NTR阶段:
      range: 0~3
      check:
        - 快照 stage < 目标 且本轮完成对应升级叙事 → 单轮 +1；否则 **禁止** replace/delta 阶段
        - 升级当楼：delta /凌月/对user的好感度/0 按对应列；**已进入该阶段后的后续楼层禁止再扣同级**
        - 升级设 NTR冷却≥3；冷却>0 禁止再升

    NTR冷却:
      range: 0~999
      check: [越界/暴露后设 3~7；常规跨游戏日 delta -1；时空跳跃可 delta -N（N=经过游戏日，不低于 0）]

    关系形态:
      type: '默认'|'user知情'|'默许'|'开放边界'
      check: [常规：知情/默许叙事后升级，单轮最多升一级；时空跳跃：摘要已到某形态时可 replace]

    里程碑.${首次共进晚餐|首次向user求助|首次维护user|首次谈未来|首次与user性爱|首次默许}:
      type: boolean
      check: [对应事件首次完成后 replace true；时空跳跃：摘要明确已发生的一次性批量 replace true]

  NTR对象:
    type: |-
      '无' | { 姓名: string; 原型类型: 'neet_uncle'|'muscular_male'|'shota'|'bestie_friend'|'house_dog'; 熟悉度: number }
    check:
      - 生成/退场均 replace 整个 /NTR对象/0；冷却=0 且前置剧情满足时生成；同时仅一名
      - 退场 value 为 '无'，并设 NTR冷却
      - 对象存在时熟悉度互动：delta +2~5，每日最多 1 次（须本轮有新互动）
      - ntr 破处熟悉度 +20~35：**仅**快照 是否处女=true 的破处当楼；破处对象=ntr 后 **禁止**再发 +20~35
      - 熟悉度分档影响叙事，见「世界观-NTR原型」「凌月_NTR状态调制」
