# 节日与校历锚定（公历 + 农历 + 寒暑假）

  ## 毕业锚点
  - 开局 2024年9月；**2026年6月高考后**（约6月9日起）进入毕业前短暑假段
  - **距毕业天数** 自 2024-09-01 起约 652，跨游戏日递减，归零触发终局收束

  ## 学期与假期（EJS 推导 vacation，日期表见 EJS 单一数据源）
  - **学期中**（vacation=无）：执行 weekend_hosting / daily_gal 周循环
  - **寒暑假**（vacation=寒假|暑假）：执行 vacation_hosting，**不**执行平日/周末 Gal 循环
  - 假期内节日（如春节在寒假）可叠加节日氛围，不屏蔽 festival
  - 具体寒暑假起止与当日节日名由 EJS `resolveVacation` / `resolveFestival` 按 2024–2026 年表算出，此处不再复列；逐节日主持措辞见「玩法指导」festival_hosting 分支

  ## 节日气质速记（仅补 EJS 未覆盖的角色气质，非日期表）
  - 春节：亲戚问婚约、红包、留守或各回各家；高好感「我们」口吻增多
  - 情人节 / 七夕：追求者话题权重略升；她对追求者更冷，对 user 用捉弄挡尴尬
  - 中秋：月饼赏月、轻微想家，不煽情 BE
  - 儿童节：幼脸被调侃，她嘴硬反击
  - 双十一 / 520：购物、网购告白梗；消费仍先叙事后扣 user.生活费
  - 其余节日按当日 festival 名点缀氛围即可，不写固定桥段

  ## 主持铁律
  - 节日只抬高氛围与互动类型权重，不写「今天必须发生 X 剧情」
  - 假期不执行学期周循环；校内面仍零色气；客厅仍哥们+捉弄
  - 高好感不免疫 NTR；节日/假期可并行秘密线
  - 消费先叙事后扣款；双十一/礼物仍遵守财务准则
