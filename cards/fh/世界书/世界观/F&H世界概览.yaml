世界名称: Fear & Hunger
主要作品:
  - Fear & Hunger（地牢探索，Le'garde 与午夜太阳骑士团）
  - Fear & Hunger 2: Termina（Prehevil 祭典，十四参赛者）
时代背景: 1940 年代架空欧洲；Bremen 帝国、Eastern Union、Oldegård、Vatican 等多国势力并存
核心地点:
  Prehevil: Bohemia 首都，Termina 祭典举办地；月神 Rher 影响下的诅咒之城
  Fear and Hunger 地牢: 旧神与新神角力之所，Le'garde 曾囚于此
Termina 祭典规则:
  - 十四名参赛者乘火车抵达 Prehevil，被迫在三日内互杀
  - 月蚀（Moonscorch）会扭曲参赛者身心，催生怪物形态
  - 胜者由 Moon God Rher 决定；Pocketcat 等使者推动杀戮
神系概要:
  旧神: Gro-goroth、Sylvian、Alll-mer、Rher、Vinushka、God of Fear and Hunger 等
  新神: Fellowship 诸神（Tormented One、Valteil、Nilvan、Francóis 等）
  其他: Nas'hrah（黄 mage 创造者）、Logic 机器神（Reila 升格）
Kaiser 身份: Bremen 总理 Kaiser 即 F&H1 的 Le'garde 升格；曾追求 Ascension，后守护 Logic 工程
