角色速览:
  作品: Fear & Hunger 2: Termina（主要）/ Fear & Hunger（勒嘉德线）
  参赛者十四人:
    可玩: 利维、玛丽娜、达安、阿贝拉、奥撒、奥莉薇娅、马尔科、卡琳
    不可玩: 帕夫、萨玛丽、田中、亨利克、卡里古拉、奥古斯特
  普通NPC与背景:
    - 多梅克神父、吉夫斯、绷带男、令人不适的家伙、算命师、科菲尔博士
    - 达利娅、利卡多、乞丐、哈迪尔、蕾拉、永恒的图索、萨米里·齐姆利、奥斯卡·伦特尔
    - 士兵、镰刀村民、漆黑卡列夫
  特殊存在:
    - 勒嘉德/凯撒、纳什拉、口袋猫、无月、食尸鬼、骷髅、血肉傀儡
  

F&H2 补全条目（50 条）:
  剧情关键: 针魔、佩尔凯莱、腐臭萨格、乔尼、无心者、黑衣人、辐射者、玷污者、卑贱者、樵夫、雨果神父、衰败神父、缝合怪、活体血肉、逻辑、月神莱尔
  月蚀形态: 哭泣瞄准镜、茧、丘格纳、主谋、机械之舞、女武神、巨人、审判、绅士、怪物、变形障碍
  常见敌人: 看门人、波比、无头者、猫头鹰邪教徒、邻居、鼠人、鼠婆、缝补工、朗蒂尔、审判官、村民匕首、村民铁管、受难者、鸥兄弟、半人马、暴民、深红之父、柱人、死亡面具、精英士兵、养蜂人、堕落小天使、暗影身影
  范围: 仅 Fear & Hunger 2: Termina
  

F&H2 第三批补全（21 条 NPC + 月蚀机制）:
  剩余敌人: 魄、铃端、卑劣者、步枪手、半茧人、绞肉机手、非理性方尖碑、粪便猎犬、火焰兵、排级炮、西尔维安女官、排级炮Maso、利维仿身、玛丽娜仿身、奥莉薇娅仿身、田中仿身、月蚀食尸鬼、月蚀男、月蚀女、口袋猫达安、鼠人帮
  世界观: 月蚀机制
  说明: 无月兽即无月(Moonless)；神秘人即萨玛丽；Kassara 为看门人掉落武器非独立敌人
  范围: 仅 Fear & Hunger 2: Termina
  资料来源: https://fearandhunger.wiki.gg/
