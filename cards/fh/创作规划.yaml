project:
  name: F&H
  worldbookName: Fear & Hunger
  form: worldbook
  mvu: false

world:
  overview: Fear & Hunger 系列黑暗奇幻 RPG 世界。F&H2: Termina 以 1940 年代东欧虚构首都 Prehevil 为舞台，十四名参赛者被迫参与 Termina 祭典，三日期限内互杀直至 Moon God Rher 选出胜者。旧神、新神、月蚀、Logic 机器神与 Kaiser（Le'garde 升格）构成多层阴谋。
  source: https://fearandhunger.wiki.gg/

style:
  perspective: 第三人称
  tone: 冷峻、压抑、带黑色幽默
  mood: 恐怖生存、道德灰度

entries:
  - name: F&H世界概览
    type: 世界观
    path: 世界书/世界观/F&H世界概览.yaml
  - name: 角色速览
    type: NPC
    path: 世界书/NPC/角色速览.yaml

